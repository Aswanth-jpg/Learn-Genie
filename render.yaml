# Render Blueprint for LearnGenie
# This file enables one-click deployment of all services on Render
# Learn more: https://render.com/docs/blueprint-spec

services:
  # Backend API Service (Node.js + Express)
  - type: web
    name: learngenie-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: BACKEND
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false  # Set this manually in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false  # Set this manually in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false  # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set this manually after frontend deployment

  # FastAPI Recommendation Service (Python)
  - type: web
    name: learngenie-ai
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: FAST_API
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn recommendation_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Static Site (React + Vite)
  - type: web
    name: learngenie-frontend
    runtime: static
    region: oregon
    plan: free
    branch: main
    rootDir: FRONTEND
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to your backend URL after backend deployment
      - key: VITE_AI_URL
        sync: false  # Set to your AI service URL after AI deployment
      - key: VITE_RAZORPAY_KEY_ID
        sync: false  # Set this manually in Render dashboard
